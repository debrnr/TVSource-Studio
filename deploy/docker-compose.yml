version: '3.8'

services:
  tvsource-studio:
    build: .
    container_name: tvsource-studio
    ports:
      - "8080:8080"
    volumes:
      # 挂载数据目录
      - ./data:/app/data
      - ./logs:/app/logs
      # 挂载配置文件
      - ./config:/app/config
    environment:
      - TZ=Asia/Shanghai
      - PORT=8080
      - UPDATE_INTERVAL=6
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - tvsource-network

networks:
  tvsource-network:
    driver: bridge
